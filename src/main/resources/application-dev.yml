spring:
  datasource:
    url: jdbc:h2:mem:ticket_booking;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driverClassName: org.h2.Driver
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false
  data:
    web:
      pageable:
        max-page-size: 50
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true

springdoc:
  swagger-ui:
    path: /docs

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expirationMs: 86400000
